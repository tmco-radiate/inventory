<!DOCTYPE html>
<html lang="en">
<div class="container">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=0.2, maximum-scale=4,user-scalable=yes">
        <title>{{ title }}</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/jquery.mobile-1.4.5.min.css') }}" />
        <script src="{{ url_for('static', filename='js/jquery-1.11.1.min.js') }}"></script>
        <script src="{{ url_for('static', filename='js/jquery.mobile-1.4.5.min.js') }}"></script>
    <!-- ヘッダー -->
    {% if home or stock %}
        {% include "header.html" %}
    {% elif stock_list %}
        {% include "header_stock.html" %}
    {% endif %}
    </head>
</div>
<body>
<!-- ヘッダー -->
<!-- Bootstrap CSS -->
<!-- fontawesome 使い方 https://saruwakakun.com/html-css/basic/font-awesome -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.4.2/css/all.css" integrity="sha384-/rXc/GQVaYpyDdyxK+ecHPVYJSN9bmVFBvjA/9eOB+pb3F2w2N6fc5qB9Ew5yIns" crossorigin="anonymous">

<header class="my-3">
    <ul class="nav nav-pills ml-3">
        <li class="nav-item"><a class="nav-link {% if index %} active{% endif %}" href="/"><i class="fas fa-home"></i> ホーム</a></li>
        <li class="nav-item"><a class="nav-link {% if home %} active{% endif %}" href="/stock"><i class="fas fa-warehouse"></i> 在庫管理</a></li>
        <li class="nav-item"><a class="nav-link {% if stock_list %} active{% endif %}" href="/stock_list"><i class="fas fa-qrcode"></i> 在庫一覧</a></li>
    </ul>
</header>
<div class="form-group">
    <h5 class="ml-5 text-secondary" id="title">{{ title }}</h5>
    <div class="ml-4">
    {% block content %}
    <!-- ここにメインコンテンツを書く -->
    {% endblock %}
    </div>
</div>
</body>

</html>
